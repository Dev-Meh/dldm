<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delete Drug</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen py-8">
  <div class="max-w-2xl mx-auto px-4">
    <div class="bg-white shadow rounded-lg p-8">
      <h1 class="text-2xl font-bold text-red-600 mb-6">Delete Drug</h1>
      
      <div class="bg-red-50 border border-red-200 rounded-lg p-4 mb-6">
        <p class="text-red-800 font-semibold">Are you sure you want to delete this drug?</p>
        <p class="text-red-700 text-sm mt-2">This will also delete the associated inventory record.</p>
      </div>

      <div class="bg-gray-50 rounded-lg p-4 mb-6">
        <p><strong>Drug Name:</strong> {{ drug.name }}</p>
        <p><strong>Price:</strong> {{ drug.price|floatformat:0 }} TZS</p>
        {% if drug.inventory %}
        <p><strong>Current Quantity:</strong> {{ drug.inventory.quantity }}</p>
        {% endif %}
      </div>

      <form method="post" class="flex justify-end gap-4">
        {% csrf_token %}
        <a href="{% url 'stock_list' %}" class="px-6 py-2 bg-gray-500 text-white rounded hover:bg-gray-600">Cancel</a>
        <button type="submit" class="px-6 py-2 bg-red-600 text-white rounded hover:bg-red-700">Delete Drug</button>
      </form>
    </div>
  </div>
</body>
</html>
