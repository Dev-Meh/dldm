<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delete User</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen py-8">
  <div class="max-w-2xl mx-auto px-4">
    <div class="bg-white shadow rounded-lg p-8">
      <h1 class="text-2xl font-bold text-red-600 mb-6">Delete User</h1>
      
      <div class="bg-red-50 border border-red-200 rounded-lg p-4 mb-6">
        <p class="text-red-800 font-semibold">Are you sure you want to delete this user?</p>
      </div>

      <div class="bg-gray-50 rounded-lg p-4 mb-6">
        <p><strong>Username:</strong> {{ user.username }}</p>
        <p><strong>Email:</strong> {{ user.email }}</p>
        <p><strong>Name:</strong> {{ user.get_full_name|default:"N/A" }}</p>
        <p><strong>Role:</strong> {{ user.get_role_display|default:user.role }}</p>
      </div>

      <form method="post" class="flex justify-end gap-4">
        {% csrf_token %}
        <a href="{% url 'user_list' %}" class="px-6 py-2 bg-gray-500 text-white rounded hover:bg-gray-600">Cancel</a>
        <button type="submit" class="px-6 py-2 bg-red-600 text-white rounded hover:bg-red-700">Delete User</button>
      </form>
    </div>
  </div>
</body>
</html>
